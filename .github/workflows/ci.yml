name: CI

# Mirrors the gate in repo 03 (search). Webflow Cloud auto-deploys on push to
# the connected branch, so this runs on PRs and on master to catch type errors,
# lint failures, test failures and leaked secrets before anything ships.
#
# Like 03, this is a gate: make it a required status check in branch protection
# (Settings > Branches > master) so PRs cannot merge while it is red.
on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so gitleaks can scan every commit
      - name: gitleaks
        # Pinned to an immutable version tag (never :latest) so the scanner
        # behaviour cannot change underneath us between runs.
        run: |
          docker run --rm -v "$PWD:/repo" zricethezav/gitleaks:v8.21.2 \
            detect --source=/repo --redact --verbose --exit-code=1

  build-test:
    name: Typecheck, lint, test & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # CI resolves from public npm — any local Artifactory .npmrc is gitignored
      # and absent here, and the lockfile has no private registry references.
      - run: pnpm install --frozen-lockfile

      - run: pnpm exec tsc -b

      - run: pnpm lint

      # The test script is provided by the test setup added separately; this
      # step gates on it once present.
      - run: pnpm test
